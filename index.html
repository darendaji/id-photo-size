<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证件照尺寸 - 换底色·改尺寸·自动排版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db;
            --primary-dark: #2980b9;
            --green: #2ecc71;
            --dark: #2d3436;
            --gray: #636e72;
            --light-gray: #b2bec3;
            --bg: #f0f4f8;
            --card: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 32px rgba(0,0,0,0.14);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--dark);
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #3498db, #2980b9);
            padding: 28px 20px 24px;
            text-align: center;
            color: white;
        }
        .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .header p  { font-size: 13px; opacity: .9; }

        /* ── Layout ── */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px 80px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 640px) {
            .main { grid-template-columns: 1fr; }
        }
        .full-width { grid-column: 1 / -1; }

        /* ── Card ── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ── Upload ── */
        .upload-area {
            border: 2px dashed #b2bec3;
            border-radius: 12px;
            padding: 36px 20px;
            text-align: center;
            cursor: pointer;
            transition: all .25s;
            background: #fafbfc;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: #eaf4fd;
        }
        .upload-area .icon { font-size: 40px; margin-bottom: 10px; }
        .upload-area .text { font-size: 15px; color: var(--gray); }
        .upload-area .hint { font-size: 12px; color: var(--light-gray); margin-top: 6px; }
        #fileInput { display: none; }

        .preview-wrap { text-align: center; }
        .preview-wrap img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 10px;
            object-fit: contain;
            border: 1px solid #e0e0e0;
        }
        .change-btn {
            margin-top: 10px;
            padding: 7px 18px;
            border-radius: 20px;
            border: 1.5px solid var(--primary);
            background: white;
            color: var(--primary);
            font-size: 13px;
            cursor: pointer;
            transition: all .2s;
        }
        .change-btn:hover { background: var(--primary); color: white; }

        /* ── Option Grid (sizes / paper / bg / print) ── */
        .option-grid {
            display: grid;
            gap: 8px;
        }
        .option-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
        .option-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
        .option-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

        .opt {
            padding: 10px 8px;
            border-radius: 10px;
            border: 2px solid #e0e6ed;
            background: #f8fafc;
            cursor: pointer;
            transition: all .2s;
            text-align: center;
            user-select: none;
        }
        .opt:hover { border-color: #74b9ff; background: #eaf4fd; }
        .opt.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, #eaf4fd, #d6eaf8);
            box-shadow: 0 0 0 3px rgba(52,152,219,.18);
        }
        .opt .opt-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--dark);
        }
        .opt.selected .opt-name { color: var(--primary-dark); }
        .opt .opt-sub {
            font-size: 11px;
            color: var(--light-gray);
            margin-top: 3px;
        }
        .opt.selected .opt-sub { color: #5dade2; }
        .opt .opt-badge {
            display: inline-block;
            margin-top: 5px;
            padding: 1px 8px;
            border-radius: 8px;
            font-size: 10px;
            background: #dff9fb;
            color: #0984e3;
        }
        .opt.selected .opt-badge { background: #2980b9; color: white; }

        /* ── Background color circles ── */
        .bg-row {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .bg-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            box-shadow: 0 2px 8px rgba(0,0,0,.12);
            transition: all .2s;
            position: relative;
        }
        .bg-circle:hover { transform: scale(1.1); }
        .bg-circle.selected {
            border-color: var(--dark);
            transform: scale(1.15);
            box-shadow: 0 4px 14px rgba(0,0,0,.22);
        }
        .bg-circle.selected::after {
            content: '✓';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
        }
        .bg-white  { background: #ffffff; border-color: #ddd !important; }
        .bg-blue   { background: #3498db; }
        .bg-red    { background: #e74c3c; }
        .bg-white.selected::after  { color: #2d3436; }
        .bg-blue.selected::after   { color: white; }
        .bg-red.selected::after    { color: white; }
        .bg-label { font-size: 12px; color: var(--gray); text-align: center; margin-top: 4px; }
        .bg-item  { display: flex; flex-direction: column; align-items: center; }

        /* ── Generate Button ── */
        .gen-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all .25s;
            box-shadow: 0 4px 16px rgba(52,152,219,.35);
        }
        .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(52,152,219,.45); }
        .gen-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        /* ── Result ── */
        .result-wrap {
            text-align: center;
        }
        .result-wrap canvas {
            max-width: 100%;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            box-shadow: var(--shadow);
        }
        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .dl-btn {
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            border: none;
        }
        .dl-btn.primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            box-shadow: 0 4px 14px rgba(52,152,219,.3);
        }
        .dl-btn.secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .dl-btn:hover { transform: scale(1.04); }

        /* ── Info table ── */
        .info-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .info-table th {
            background: #f0f4f8;
            padding: 7px 10px;
            text-align: left;
            color: var(--gray);
            font-weight: 500;
        }
        .info-table td {
            padding: 7px 10px;
            border-bottom: 1px solid #f0f4f8;
            color: var(--dark);
        }
        .info-table tr:last-child td { border-bottom: none; }

        /* ── Loading overlay ── */
        .loading {
            position: fixed; inset: 0;
            background: rgba(255,255,255,.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 999;
        }
        .loading.show { display: flex; }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #e0e0e0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { margin-top: 14px; color: var(--gray); font-size: 14px; }

        /* ── Result info bar ── */
        .result-info {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }
        .result-tag {
            padding: 4px 12px;
            border-radius: 12px;
            background: #eaf4fd;
            color: var(--primary-dark);
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📷 证件照尺寸</h1>
    <p>换底色 · 精确裁剪 · 自动满铺排版</p>
</div>

<div class="main">

    <!-- ① 上传照片 -->
    <div class="card">
        <div class="card-title">① 上传照片</div>
        <div id="uploadArea" class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="icon">🖼️</div>
            <div class="text">点击或拖拽上传照片</div>
            <div class="hint">支持 JPG / PNG</div>
        </div>
        <div id="previewWrap" class="preview-wrap" style="display:none">
            <img id="previewImg" src="" alt="预览">
            <br>
            <button class="change-btn" onclick="document.getElementById('fileInput').click()">🔄 更换照片</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
    </div>

    <!-- ② 证件照尺寸 -->
    <div class="card">
        <div class="card-title">② 证件照尺寸</div>
        <div class="option-grid cols-2" id="sizeGrid"></div>
    </div>

    <!-- ③ 背景颜色 -->
    <div class="card">
        <div class="card-title">③ 背景颜色</div>
        <div class="bg-row" id="bgRow"></div>
    </div>

    <!-- ④ 相纸大小 -->
    <div class="card">
        <div class="card-title">④ 相纸大小</div>
        <div class="option-grid cols-2" id="paperGrid"></div>
    </div>

    <!-- ⑤ 生成按钮 -->
    <div class="card full-width" style="padding:16px">
        <button class="gen-btn" id="genBtn" onclick="generate()" disabled>
            🖨️ 生成证件照（自动满铺排版）
        </button>
    </div>

    <!-- ⑥ 结果 -->
    <div class="card full-width" id="resultCard" style="display:none">
        <div class="card-title">⑥ 排版结果</div>
        <div class="result-wrap">
            <canvas id="resultCanvas"></canvas>
            <div class="result-info" id="resultInfo"></div>
            <div class="result-actions">
                <button class="dl-btn primary" onclick="download()">💾 下载图片</button>
                <button class="dl-btn secondary" onclick="document.getElementById('resultCard').style.display='none'">✕ 关闭</button>
            </div>
        </div>
    </div>

    <!-- 尺寸参考 -->
    <div class="card full-width">
        <div class="card-title">📋 常见证件尺寸参考</div>
        <table class="info-table">
            <tr><th>名称</th><th>尺寸(mm)</th><th>像素(300dpi)</th><th>用途</th></tr>
            <tr><td>1寸</td><td>25×35</td><td>295×413</td><td>常用报名照</td></tr>
            <tr><td>2寸</td><td>35×49</td><td>413×579</td><td>简历、入学</td></tr>
            <tr><td>小1寸</td><td>22×32</td><td>260×378</td><td>驾驶证</td></tr>
            <tr><td>大一寸</td><td>33×48</td><td>390×567</td><td>身份证、护照</td></tr>
            <tr><td>美国签证</td><td>51×51</td><td>602×602</td><td>美签</td></tr>
            <tr><td>日本签证</td><td>45×45</td><td>531×531</td><td>日签</td></tr>
            <tr><td>欧洲签证</td><td>35×45</td><td>413×531</td><td>申根签</td></tr>
            <tr><td>简历照</td><td>35×45</td><td>413×531</td><td>求职简历</td></tr>
        </table>
    </div>

</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p>正在处理，请稍候…</p>
</div>

<canvas id="offscreen" style="display:none"></canvas>

<script>
// ─────────────────────────────────────────────
// 数据配置
// ─────────────────────────────────────────────
const SIZES = [
    { name:'1寸',      w:25, h:35, badge:'常用' },
    { name:'2寸',      w:35, h:49, badge:'常用' },
    { name:'小1寸',    w:22, h:32, badge:'驾照' },
    { name:'大一寸',   w:33, h:48, badge:'身份证' },
    { name:'护照',     w:33, h:48, badge:'白底' },
    { name:'美国签证', w:51, h:51, badge:'白底' },
    { name:'日本签证', w:45, h:45, badge:'白底' },
    { name:'欧洲签证', w:35, h:45, badge:'申根' },
    { name:'简历照',   w:35, h:45, badge:'蓝底' },
    { name:'自定义',   w:0,  h:0,  badge:'自填' },
];

const BG_COLORS = [
    { name:'白底', color:'#FFFFFF', cls:'bg-white' },
    { name:'蓝底', color:'#3498db', cls:'bg-blue'  },
    { name:'红底', color:'#e74c3c', cls:'bg-red'   },
];

// 相纸尺寸（mm）
const PAPERS = [
    { name:'3寸',  w:89,  h:127, badge:'常用' },
    { name:'4寸',  w:102, h:152, badge:'最常用' },
    { name:'5寸',  w:127, h:178, badge:'常用' },
    { name:'6寸',  w:152, h:102, badge:'横版' },
    { name:'A4',   w:210, h:297, badge:'打印' },
    { name:'A5',   w:148, h:210, badge:'打印' },
];

// ─────────────────────────────────────────────
// 状态
// ─────────────────────────────────────────────
let state = {
    image: null,          // HTMLImageElement
    sizeIdx: 0,
    bgIdx: 1,             // 默认蓝底
    paperIdx: 1,          // 默认4寸
    customW: 0,
    customH: 0,
};

// ─────────────────────────────────────────────
// 渲染选项
// ─────────────────────────────────────────────
function renderSizes() {
    const grid = document.getElementById('sizeGrid');
    grid.innerHTML = SIZES.map((s, i) => `
        <div class="opt ${i===state.sizeIdx?'selected':''}" onclick="selectSize(${i})">
            <div class="opt-name">${s.name}</div>
            <div class="opt-sub">${s.w&&s.h ? s.w+'×'+s.h+' mm' : '自定义'}</div>
            <span class="opt-badge">${s.badge}</span>
        </div>
    `).join('') + `
        <div id="customInputs" style="grid-column:1/-1;display:${state.sizeIdx===SIZES.length-1?'flex':'none'};gap:8px;margin-top:4px;align-items:center">
            <input id="cwInput" type="number" placeholder="宽(mm)" style="flex:1;padding:8px;border:2px solid #e0e6ed;border-radius:8px;font-size:14px" oninput="updateCustom()">
            <span style="color:#636e72">×</span>
            <input id="chInput" type="number" placeholder="高(mm)" style="flex:1;padding:8px;border:2px solid #e0e6ed;border-radius:8px;font-size:14px" oninput="updateCustom()">
        </div>
    `;
}

function renderBg() {
    const row = document.getElementById('bgRow');
    row.innerHTML = BG_COLORS.map((b, i) => `
        <div class="bg-item">
            <div class="bg-circle ${b.cls} ${i===state.bgIdx?'selected':''}" onclick="selectBg(${i})"></div>
            <div class="bg-label">${b.name}</div>
        </div>
    `).join('');
}

function renderPapers() {
    const grid = document.getElementById('paperGrid');
    grid.innerHTML = PAPERS.map((p, i) => `
        <div class="opt ${i===state.paperIdx?'selected':''}" onclick="selectPaper(${i})">
            <div class="opt-name">${p.name}</div>
            <div class="opt-sub">${p.w}×${p.h} mm</div>
            <span class="opt-badge">${p.badge}</span>
        </div>
    `).join('');
}

function selectSize(i) {
    state.sizeIdx = i;
    renderSizes();
    checkReady();
}
function selectBg(i) {
    state.bgIdx = i;
    renderBg();
}
function selectPaper(i) {
    state.paperIdx = i;
    renderPapers();
}
function updateCustom() {
    state.customW = parseFloat(document.getElementById('cwInput').value) || 0;
    state.customH = parseFloat(document.getElementById('chInput').value) || 0;
    checkReady();
}

// ─────────────────────────────────────────────
// 文件上传
// ─────────────────────────────────────────────
function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
            state.image = img;
            document.getElementById('previewImg').src = ev.target.result;
            document.getElementById('uploadArea').style.display = 'none';
            document.getElementById('previewWrap').style.display = 'block';
            checkReady();
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
}

// Drag & drop
const ua = document.getElementById('uploadArea');
ua.addEventListener('dragover', e => { e.preventDefault(); ua.classList.add('dragover'); });
ua.addEventListener('dragleave', () => ua.classList.remove('dragover'));
ua.addEventListener('drop', e => {
    e.preventDefault(); ua.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
        document.getElementById('fileInput').files = e.dataTransfer.files;
        handleFile({ target: { files: [file] } });
    }
});

function checkReady() {
    const s = SIZES[state.sizeIdx];
    const hasSize = s.w && s.h || (state.sizeIdx === SIZES.length-1 && state.customW && state.customH);
    document.getElementById('genBtn').disabled = !(state.image && hasSize);
}

// ─────────────────────────────────────────────
// 核心：生成排版
// ─────────────────────────────────────────────
const DPI = 300;
const MM2PX = DPI / 25.4;   // 1mm → px (300dpi)
const GAP_MM = 2;            // 照片间距 2mm

function mmToPx(mm) { return Math.round(mm * MM2PX); }

function generate() {
    if (!state.image) return;

    const sizeData = SIZES[state.sizeIdx];
    const photoW_mm = sizeData.w || state.customW;
    const photoH_mm = sizeData.h || state.customH;
    const paper = PAPERS[state.paperIdx];
    const bgColor = BG_COLORS[state.bgIdx].color;

    if (!photoW_mm || !photoH_mm) {
        alert('请填写自定义尺寸');
        return;
    }

    document.getElementById('loading').classList.add('show');

    setTimeout(() => {
        try {
            // ── 1. 裁剪并缩放单张照片到精确像素 ──
            const photoW_px = mmToPx(photoW_mm);
            const photoH_px = mmToPx(photoH_mm);

            const singleCanvas = document.createElement('canvas');
            singleCanvas.width  = photoW_px;
            singleCanvas.height = photoH_px;
            const sCtx = singleCanvas.getContext('2d');

            // 填充背景色
            sCtx.fillStyle = bgColor;
            sCtx.fillRect(0, 0, photoW_px, photoH_px);

            // 居中裁剪原图（保持比例，填满目标区域）
            const src = state.image;
            const srcRatio = src.width / src.height;
            const dstRatio = photoW_px / photoH_px;
            let sx, sy, sw, sh;
            if (srcRatio > dstRatio) {
                sh = src.height;
                sw = sh * dstRatio;
                sx = (src.width - sw) / 2;
                sy = 0;
            } else {
                sw = src.width;
                sh = sw / dstRatio;
                sx = 0;
                sy = (src.height - sh) / 2;
            }
            sCtx.drawImage(src, sx, sy, sw, sh, 0, 0, photoW_px, photoH_px);

            // ── 2. 计算相纸上能放几行几列 ──
            const paperW_px = mmToPx(paper.w);
            const paperH_px = mmToPx(paper.h);
            const gap_px    = mmToPx(GAP_MM);
            const margin_px = mmToPx(3); // 3mm 边距

            const usableW = paperW_px - margin_px * 2;
            const usableH = paperH_px - margin_px * 2;

            const cols = Math.floor((usableW + gap_px) / (photoW_px + gap_px));
            const rows = Math.floor((usableH + gap_px) / (photoH_px + gap_px));

            if (cols < 1 || rows < 1) {
                alert(`相纸太小，无法放下 ${sizeData.name || '自定义'} 照片，请换大相纸`);
                document.getElementById('loading').classList.remove('show');
                return;
            }

            const total = cols * rows;

            // ── 3. 绘制相纸 ──
            const canvas = document.getElementById('resultCanvas');
            // 显示时缩放到最大 800px 宽，但保存时用原始分辨率
            const scale = Math.min(1, 800 / paperW_px);
            canvas.width  = paperW_px;
            canvas.height = paperH_px;
            canvas.style.width  = Math.round(paperW_px  * scale) + 'px';
            canvas.style.height = Math.round(paperH_px * scale) + 'px';

            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, paperW_px, paperH_px);

            // 居中排列
            const totalW = cols * photoW_px + (cols - 1) * gap_px;
            const totalH = rows * photoH_px + (rows - 1) * gap_px;
            const startX = Math.round((paperW_px - totalW) / 2);
            const startY = Math.round((paperH_px - totalH) / 2);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = startX + c * (photoW_px + gap_px);
                    const y = startY + r * (photoH_px + gap_px);
                    ctx.drawImage(singleCanvas, x, y, photoW_px, photoH_px);
                    // 细边框
                    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, photoW_px, photoH_px);
                }
            }

            // ── 4. 显示结果 ──
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });

            document.getElementById('resultInfo').innerHTML = `
                <span class="result-tag">📐 ${sizeData.name || '自定义'} ${photoW_mm}×${photoH_mm}mm</span>
                <span class="result-tag">🎨 ${BG_COLORS[state.bgIdx].name}</span>
                <span class="result-tag">📄 ${paper.name}相纸 ${paper.w}×${paper.h}mm</span>
                <span class="result-tag">🖼️ 共 ${total} 张（${cols}列×${rows}行）</span>
                <span class="result-tag">🔍 ${DPI}dpi 高清</span>
            `;

        } catch(err) {
            alert('处理失败：' + err.message);
        }
        document.getElementById('loading').classList.remove('show');
    }, 80);
}

// ─────────────────────────────────────────────
// 下载
// ─────────────────────────────────────────────
function download() {
    const canvas = document.getElementById('resultCanvas');
    const sizeData = SIZES[state.sizeIdx];
    const paper = PAPERS[state.paperIdx];
    const bgName = BG_COLORS[state.bgIdx].name;
    const link = document.createElement('a');
    link.download = `证件照_${sizeData.name}_${bgName}_${paper.name}相纸.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
}

// ─────────────────────────────────────────────
// 初始化
// ─────────────────────────────────────────────
renderSizes();
renderBg();
renderPapers();
</script>
